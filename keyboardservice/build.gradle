plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sys.tool.inputpad'
    compileSdk 34

    defaultConfig {
        applicationId 'com.sys.tool.inputpad'
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "2.1"
    }

    // 【必须补充】指定 Java 版本，避免语法兼容性问题
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 【必须补充】定义构建类型
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
}
